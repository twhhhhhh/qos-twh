<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python 列表算法溫習網頁 (Core部分) </title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .highlight-current { background-color: #fef3c7; border: 2px solid #f59e0b; font-weight: bold; transform: scale(1.1); transition: all 0.3s; }
        .highlight-moving { background-color: #dcfce7; border: 2px solid #22c55e; transform: translateY(-5px); }
        .code-container { transition: max-height 0.3s ease-out; overflow: hidden; }
        .hidden-code { max-height: 0; }
        .visible-code { max-height: 800px; }
        .empty-slot { border: 2px dashed #cbd5e1; background-color: #f8fafc; color: #94a3b8; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans leading-relaxed">

<div class="max-w-4xl mx-auto px-4 py-12">
    <header class="text-center mb-12">
        <h1 class="text-4xl font-extrabold text-indigo-700 mb-4">Python 列表算法 (Lv1 & Lv2)</h1>
        <p class="text-slate-600">Level1 : 簡單於列表運算 、Level2 : 列表內的位移與排序檢查</p>
    </header>

    <!-- 導覽切換 -->
    <div class="flex justify-center mb-8 space-x-4">
        <button onclick="switchLevel(1)" id="btn-lv1" class="px-6 py-2 rounded-full font-bold bg-indigo-600 text-white shadow-lg">Level 1: 基礎計算</button>
        <button onclick="switchLevel(2)" id="btn-lv2" class="px-6 py-2 rounded-full font-bold bg-white text-indigo-600 border border-indigo-600 hover:bg-indigo-50">Level 2: 位置與操作</button>
    </div>

    <div id="lv1-container" class="space-y-8">
        <!-- Lv1 內容 -->
    </div>

    <div id="lv2-container" class="space-y-8 hidden">
        <!-- Lv2 內容 -->
    </div>
</div>

<script>
    const listA = [20, 18, 40, 30, 10, 5];
    const listSorted = [5, 10, 18, 20, 30, 40, 50];

    const algorithms = [
        // Level 1 Algorithms
        {
            id: 'avg', level: 1, title: 'i) 平均值 (Average)', description: '計算總和並除以長度。', variable: 'avg_value',
            data: [...listA],
            logic: (list, i, state) => {
                if (i === 0) state.sum = 0;
                state.sum = state.sum + list[i];
                state.val = (state.sum / (i + 1)).toFixed(2);
                return `加總中：${state.sum}`;
            },
            codeFor: `sum_val = 0\nfor i in range(0, 6):\n    sum_val = sum_val + A[i]\navg_value = sum_val / 6`,
            codeWhile: `sum_val = 0\ni = 0\nwhile i < 6:\n    sum_val = sum_val + A[i]\n    i = i + 1\navg_value = sum_val / 6`
        },
        {
            id: 'max', level: 1, title: 'ii) 最大值 (Find Max)', description: '逐一比較更新最大值變量。', variable: 'max_value',
            data: [...listA],
            logic: (list, i, state) => {
                if (i === 0) state.val = list[0];
                if (list[i] > state.val) state.val = list[i];
                return `當前最大：${state.val}`;
            },
            codeFor: `max_value = A[0]\nfor i in range(0, 6):\n    if A[i] > max_value:\n        max_value = A[i]`,
            codeWhile: `max_value = A[0]\ni = 0\nwhile i < 6:\n    if A[i] > max_value:\n        max_value = A[i]\n    i = i + 1`
        },
        // Level 2 Algorithms
        {
            id: 'insert', level: 2, title: 'ii) 插入 (Insert 28 at Index 3)', description: '從最後一個項目開始向後移位，騰出空間。', variable: 'A',
            data: [20, 18, 40, 30, 10, 5, null],
            logic: (list, i, state) => {
                // 模擬從後往前的移動 (i 從 5 遞減到 3)
                let actualI = 5 - i; 
                if (actualI >= 3) {
                    list[actualI + 1] = list[actualI];
                    list[actualI] = null;
                    state.val = "移動中...";
                    return `將索引 ${actualI} 的數值 ${list[actualI+1]} 移到索引 ${actualI+1}`;
                } else if (actualI === 2) {
                    list[3] = 28;
                    state.val = "完成！";
                    return "在索引 3 插入數值 28";
                }
                return "移位完成";
            },
            codeFor: `A = [20, 18, 40, 30, 10, 5, 0] # 增加空間\nfor i in range(5, 2, -1): # 倒轉範圍\n    A[i + 1] = A[i]\nA[3] = 28`,
            codeWhile: `i = 5\nwhile i >= 3:\n    A[i + 1] = A[i]\n    i = i - 1\nA[3] = 28`
        },
        {
            id: 'delete', level: 2, title: 'iii) 刪除 (Delete Index 2)', description: '將索引 2 之後的項目向前移，最後騰空。', variable: 'A',
            data: [20, 18, 40, 30, 10, 5],
            logic: (list, i, state) => {
                let startI = 2 + i;
                if (startI < 5) {
                    list[startI] = list[startI + 1];
                    list[startI + 1] = null;
                    state.val = "移位中...";
                    return `將索引 ${startI+1} 的 ${list[startI]} 覆蓋到索引 ${startI}`;
                }
                state.val = "完成";
                return "刪除完成，最後一位騰空";
            },
            codeFor: `for i in range(2, 5):\n    A[i] = A[i + 1]\nA[5] = None`,
            codeWhile: `i = 2\nwhile i < 5:\n    A[i] = A[i + 1]\n    i = i + 1\nA[5] = None`
        },
        {
            id: 'compare', level: 2, title: 'iv) 比較 (Is Sorted?)', description: '檢查 A[i] 是否大於 A[i+1]。', variable: 'is_sorted',
            data: [5, 10, 18, 20, 30, 40, 50],
            logic: (list, i, state) => {
                if (i === 0) state.val = "TRUE";
                if (i < 6) {
                    if (list[i] > list[i+1]) state.val = "FALSE";
                    return `檢查 ${list[i]} <= ${list[i+1]}?`;
                }
                return "檢查完畢";
            },
            codeFor: `is_sorted = True\nfor i in range(0, 6):\n    if A[i] > A[i + 1]:\n        is_sorted = False`,
            codeWhile: `is_sorted = True\ni = 0\nwhile i < 6:\n    if A[i] > A[i + 1]:\n        is_sorted = False\n        break\n    i = i + 1`
        },
        {
            id: 'reverse', level: 2, title: 'v) 倒轉 (Reverse List)', description: '首尾兩兩交換，直到中點。', variable: 'Swap',
            data: [5, 10, 18, 20, 30, 40, 50],
            logic: (list, i, state) => {
                if (i < 3) {
                    let left = i;
                    let right = 6 - i;
                    let temp = list[left];
                    list[left] = list[right];
                    list[right] = temp;
                    state.val = `交換了 ${list[right]} 和 ${list[left]}`;
                    return `i=${i}: 交換索引 ${left} 與 ${right}`;
                }
                return "倒轉完成 (只須執行 len/2 次)";
            },
            codeFor: `n = 7\nfor i in range(0, 3):\n    temp = A[i]\n    A[i] = A[n - 1 - i]\n    A[n - 1 - i] = temp`,
            codeWhile: `i = 0\nwhile i < 3:\n    temp = A[i]\n    A[i] = A[6 - i]\n    A[6 - i] = temp\n    i = i + 1`
        }
    ];

    function renderAlgorithm(algo) {
        const container = algo.level === 1 ? document.getElementById('lv1-container') : document.getElementById('lv2-container');
        const section = document.createElement('div');
        section.className = 'bg-white rounded-xl shadow p-6 border border-slate-200';
        section.innerHTML = `
            <div class="flex flex-col md:flex-row justify-between items-start mb-4">
                <div>
                    <h3 class="text-xl font-bold text-indigo-600">${algo.title}</h3>
                    <p class="text-slate-500 text-sm">${algo.description}</p>
                </div>
                <div class="mt-4 md:mt-0 space-x-2 shrink-0">
                    <button onclick="toggleCode('${algo.id}')" class="px-3 py-1 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded text-sm transition">程式碼</button>
                    <button onclick="runStep('${algo.id}')" class="px-4 py-1 bg-indigo-600 hover:bg-indigo-700 text-white rounded text-sm font-bold transition">下一步</button>
                    <button onclick="resetStep('${algo.id}')" class="px-3 py-1 bg-red-50 hover:bg-red-100 text-red-600 rounded text-sm transition">重設</button>
                </div>
            </div>

            <div class="bg-slate-50 p-4 rounded-lg mb-4">
                <div id="list-${algo.id}" class="flex gap-2 justify-center mb-6 flex-wrap"></div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-white p-2 rounded border border-slate-200 text-center">
                        <span class="text-slate-400 text-[10px] uppercase block">i</span>
                        <span id="i-${algo.id}" class="text-xl font-mono text-indigo-600">-</span>
                    </div>
                    <div class="bg-white p-2 rounded border border-slate-200 text-center">
                        <span class="text-slate-400 text-[10px] uppercase block">${algo.variable}</span>
                        <span id="val-${algo.id}" class="text-xl font-mono text-emerald-600">-</span>
                    </div>
                </div>
                <div id="log-${algo.id}" class="mt-4 text-center text-sm font-medium text-slate-700 h-6">準備就緒</div>
            </div>

            <div id="code-box-${algo.id}" class="code-container hidden-code">
                <div class="flex bg-slate-800 text-white rounded-t-lg overflow-hidden">
                    <button id="btn-for-${algo.id}" onclick="showLang('${algo.id}', 'for')" class="flex-1 py-2 text-xs font-bold bg-slate-700 border-b-2 border-indigo-500">For 迴圈</button>
                    <button id="btn-while-${algo.id}" onclick="showLang('${algo.id}', 'while')" class="flex-1 py-2 text-xs font-bold hover:bg-slate-700 transition">While 迴圈</button>
                </div>
                <pre id="code-content-${algo.id}" class="bg-slate-900 text-indigo-300 p-4 rounded-b-lg font-mono text-sm whitespace-pre-wrap">${algo.codeFor}</pre>
            </div>
        `;
        container.appendChild(section);
        drawList(algo.id, algo.data);
        algo.currentState = { i: -1, stateObj: {}, currentData: [...algo.data] };
    }

    function drawList(algoId, data) {
        const container = document.getElementById(`list-${algoId}`);
        container.innerHTML = '';
        data.forEach((val, idx) => {
            const div = document.createElement('div');
            div.className = `w-10 h-10 md:w-12 md:h-12 flex flex-col items-center justify-center rounded font-bold border transition-all ${val === null ? 'empty-slot' : 'bg-white border-slate-300 text-slate-700'}`;
            div.innerHTML = `<span class="text-[9px] text-slate-400 font-normal">${idx}</span><span>${val !== null ? val : ''}</span>`;
            div.id = `${algoId}-item-${idx}`;
            container.appendChild(div);
        });
    }

    function switchLevel(lv) {
        document.getElementById('lv1-container').classList.toggle('hidden', lv !== 1);
        document.getElementById('lv2-container').classList.toggle('hidden', lv !== 2);
        
        const b1 = document.getElementById('btn-lv1');
        const b2 = document.getElementById('btn-lv2');
        
        if (lv === 1) {
            b1.className = "px-6 py-2 rounded-full font-bold bg-indigo-600 text-white shadow-lg";
            b2.className = "px-6 py-2 rounded-full font-bold bg-white text-indigo-600 border border-indigo-600 hover:bg-indigo-50";
        } else {
            b2.className = "px-6 py-2 rounded-full font-bold bg-indigo-600 text-white shadow-lg";
            b1.className = "px-6 py-2 rounded-full font-bold bg-white text-indigo-600 border border-indigo-600 hover:bg-indigo-50";
        }
    }

    function runStep(id) {
        const algo = algorithms.find(a => a.id === id);
        algo.currentState.i++;
        const i = algo.currentState.i;

        // 限制步數
        const maxSteps = (id === 'reverse') ? 3 : (id === 'insert' ? 4 : 6);
        if (i >= maxSteps) {
            document.getElementById(`log-${id}`).innerText = "演算法執行完畢";
            return;
        }

        const msg = algo.logic(algo.currentState.currentData, i, algo.currentState.stateObj);
        
        // 更新 UI
        drawList(id, algo.currentState.currentData);
        
        // 高亮當前操作
        let highlightIdx = i;
        if (id === 'insert') highlightIdx = 5 - i;
        if (id === 'delete') highlightIdx = 2 + i;
        if (id === 'reverse') highlightIdx = i;

        const el = document.getElementById(`${id}-item-${highlightIdx}`);
        if (el) el.classList.add('highlight-current');

        document.getElementById(`i-${id}`).innerText = i;
        document.getElementById(`val-${id}`).innerText = algo.currentState.stateObj.val || '-';
        document.getElementById(`log-${id}`).innerText = msg;
    }

    function resetStep(id) {
        const algo = algorithms.find(a => a.id === id);
        algo.currentState = { i: -1, stateObj: {}, currentData: [...algo.data] };
        drawList(id, algo.data);
        document.getElementById(`i-${id}`).innerText = '-';
        document.getElementById(`val-${id}`).innerText = '-';
        document.getElementById(`log-${id}`).innerText = "已重設";
    }

    function toggleCode(id) {
        const box = document.getElementById(`code-box-${id}`);
        box.classList.toggle('hidden-code');
        box.classList.toggle('visible-code');
    }

    function showLang(id, lang) {
        const algo = algorithms.find(a => a.id === id);
        const content = document.getElementById(`code-content-${id}`);
        const btnFor = document.getElementById(`btn-for-${id}`);
        const btnWhile = document.getElementById(`btn-while-${id}`);

        if (lang === 'for') {
            content.innerText = algo.codeFor;
            btnFor.classList.add('bg-slate-700', 'border-b-2', 'border-indigo-500');
            btnWhile.classList.remove('bg-slate-700', 'border-b-2', 'border-indigo-500');
        } else {
            content.innerText = algo.codeWhile;
            btnWhile.classList.add('bg-slate-700', 'border-b-2', 'border-indigo-500');
            btnFor.classList.remove('bg-slate-700', 'border-b-2', 'border-indigo-500');
        }
    }

    window.onload = () => {
        algorithms.forEach(renderAlgorithm);
    };
</script>

</body>
</html>
